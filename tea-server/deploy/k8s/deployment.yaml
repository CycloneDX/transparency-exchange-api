# TEA Server Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tea-server
  labels:
    app.kubernetes.io/name: tea-server
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: transparency-exchange-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: tea-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tea-server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8734"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: tea-server
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: tea-server
          image: ghcr.io/cyclonedx/transparency-exchange-api/tea-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8734
              protocol: TCP
          env:
            - name: TEA_PORT
              value: "8734"
            - name: TEA_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: tea-server-config
                  key: server-url
            - name: TEA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tea-server-secrets
                  key: jwt-secret
            - name: TEA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tea-server-secrets
                  key: database-url
            - name: RUST_LOG
              value: "info,tea_server=debug"
            - name: TEA_SIGNING_MODE
              valueFrom:
                configMapKeyRef:
                  name: tea-server-config
                  key: signing-mode
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: tea-server
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: tea-server
  labels:
    app.kubernetes.io/name: tea-server
spec:
  type: ClusterIP
  ports:
    - port: 8734
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: tea-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tea-server-config
data:
  server-url: "https://tea.example.com"
  signing-mode: "keyless"
---
apiVersion: v1
kind: Secret
metadata:
  name: tea-server-secrets
type: Opaque
stringData:
  # These must be set before deployment
  jwt-secret: "CHANGE-ME-32-bytes-minimum-required"
  database-url: "postgres://tea:CHANGE-ME@postgres:5432/tea"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tea-server
  labels:
    app.kubernetes.io/name: tea-server
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tea-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tea-server
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: tea-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tea-server
