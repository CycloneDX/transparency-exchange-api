syntax = "proto3";

package tea.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";
import "tea/v1/common.proto";

option go_package = "github.com/CycloneDX/transparency-exchange-api/gen/go/tea/v1;teav1";
option java_package = "org.cyclonedx.tea.v1";
option java_multiple_files = true;
option csharp_namespace = "CycloneDX.Tea.V1";

// ============================================================================
// TEA Product
// ============================================================================

// Product represents a TEA Product - an optional higher-level object that
// groups multiple Product Releases for a product line or family.
//
// Products can be discovered and browsed; releases are accessed via the
// product releases endpoint.
//
// Example: "Apache Log4j 2" is a Product containing multiple ProductReleases
// like 2.24.3, 2.24.2, etc.
message Product {
  // Unique identifier for this TEA Product.
  // Format: UUID v4 or v7.
  string uuid = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  // Human-readable name of the product.
  string name = 2 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 512
  ];

  // Optional description of the product.
  string description = 3 [(buf.validate.field).string.max_len = 4096];

  // List of identifiers for this product.
  // A product may have multiple identifiers (e.g., both CPE and PURL).
  repeated Identifier identifiers = 4;

  // Vendor/publisher information.
  Vendor vendor = 5;

  // Timestamp when this product was created in the TEA system.
  google.protobuf.Timestamp created_date = 6 [json_name = "createdDate"];

  // Timestamp when this product was last modified.
  google.protobuf.Timestamp modified_date = 7 [json_name = "modifiedDate"];

  // Optional URL to the product's homepage.
  string homepage_url = 8 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "homepageUrl"
  ];

  // Optional URL to the product's documentation.
  string documentation_url = 9 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "documentationUrl"
  ];

  // Optional URL to the product's VCS repository.
  string vcs_url = 10 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "vcsUrl"
  ];

  // Optional deprecation information.
  optional Deprecation deprecation = 11;
}

// Vendor represents a product vendor or publisher.
message Vendor {
  // Vendor name.
  string name = 1 [(buf.validate.field).string.max_len = 512];

  // Optional vendor UUID (if registered in this TEA instance).
  optional string uuid = 2 [(buf.validate.field).string.uuid = true];

  // Optional vendor URL.
  string url = 3 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Optional contact information.
  repeated Contact contacts = 4;
}

// Contact represents contact information for a vendor or organization.
message Contact {
  // Contact name.
  string name = 1 [(buf.validate.field).string.max_len = 256];

  // Contact email address.
  string email = 2 [
    (buf.validate.field).string.email = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];

  // Contact phone number.
  string phone = 3 [(buf.validate.field).string.max_len = 64];
}

// ============================================================================
// TEA Product Release
// ============================================================================

// ProductRelease represents a specific versioned release of a TEA Product.
// It is the primary resolvable entity via TEI and the entry point for
// discovery of included components and related collections of security artifacts.
//
// A ProductRelease is what a customer acquires or downloads - hardware and/or
// software. It can be a bundle of many digital devices or software applications.
message ProductRelease {
  // Unique identifier for this product release.
  // Format: UUID v4 or v7.
  string uuid = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  // UUID of the TEA Product this release belongs to.
  // Optional - a release may exist without a parent product.
  optional string product = 2 [(buf.validate.field).string.uuid = true];

  // Human-readable version string of the product release.
  // Can follow any versioning scheme (semver, calver, etc.).
  string version = 3 [
    (buf.validate.field).string.min_len = 1,
    (buf.validate.field).string.max_len = 256
  ];

  // Timestamp when this product release was created in the TEA system.
  google.protobuf.Timestamp created_date = 4 [json_name = "createdDate"];

  // Upstream product release timestamp.
  // This is the actual release date, not when it was added to TEA.
  google.protobuf.Timestamp release_date = 5 [json_name = "releaseDate"];

  // Indicates if this is a pre-release (beta, RC, milestone, etc.).
  // Pre-releases may have limited support or stability guarantees.
  // This flag can be disabled (set to false) after creation, but not enabled.
  bool pre_release = 6 [json_name = "preRelease"];

  // List of identifiers for this product release.
  // Must include at least one TEI for discovery.
  repeated Identifier identifiers = 7;

  // List of TEA Components included in this product release.
  // For composed products, this lists all bundled components.
  repeated ComponentRef components = 8;

  // Optional lifecycle status (if CLE is integrated).
  LifecycleStatus lifecycle_status = 9 [json_name = "lifecycleStatus"];

  // Optional deprecation information.
  optional Deprecation deprecation = 10;
}

// ComponentRef is a reference to a TEA Component included in a ProductRelease.
message ComponentRef {
  // UUID of the TEA Component.
  string uuid = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).required = true
  ];

  // Optional UUID of a specific TEA Component Release to pin.
  // If omitted, the product release may include any/multiple releases
  // of the referenced component.
  optional string release = 2 [(buf.validate.field).string.uuid = true];
}

// ============================================================================
// Lifecycle Status (CLE Integration)
// ============================================================================

// LifecyclePhase represents the current phase in a product's lifecycle.
// Based on OWASP Common Lifecycle Enumeration (CLE).
enum LifecyclePhase {
  // Unspecified phase.
  LIFECYCLE_PHASE_UNSPECIFIED = 0;

  // Product is in active development.
  LIFECYCLE_PHASE_DEVELOPMENT = 1;

  // Product is released and actively maintained.
  LIFECYCLE_PHASE_ACTIVE = 2;

  // Product is still supported but no new features.
  LIFECYCLE_PHASE_MAINTENANCE = 3;

  // Product has reached end of life.
  LIFECYCLE_PHASE_END_OF_LIFE = 4;

  // Product has been deprecated in favor of a successor.
  LIFECYCLE_PHASE_DEPRECATED = 5;

  // Product has been superseded by another product.
  LIFECYCLE_PHASE_SUPERSEDED = 6;
}

// LifecycleStatus contains lifecycle information for a product or release.
message LifecycleStatus {
  // Current lifecycle phase.
  LifecyclePhase phase = 1;

  // End of active support date (if known).
  google.protobuf.Timestamp end_of_support = 2 [json_name = "endOfSupport"];

  // End of life date (if known).
  google.protobuf.Timestamp end_of_life = 3 [json_name = "endOfLife"];

  // UUID of the successor product/release (if superseded).
  optional string successor_uuid = 4 [json_name = "successorUuid"];

  // Human-readable lifecycle notes.
  string notes = 5;
}

// ============================================================================
// Request/Response Messages
// ============================================================================

// ListProductsRequest is the request for listing products.
message ListProductsRequest {
  // Pagination parameters.
  PageRequest pagination = 1;

  // Optional filter by vendor UUID.
  optional string vendor_uuid = 2 [(buf.validate.field).string.uuid = true, json_name = "vendorUuid"];

  // Optional search query (matches name, description).
  string query = 3 [(buf.validate.field).string.max_len = 256];

  // Optional sort specification.
  SortSpec sort = 4;

  // Filter by identifier.
  optional Identifier identifier = 5;
}

// ListProductsResponse is the response for listing products.
message ListProductsResponse {
  // List of products.
  repeated Product products = 1;

  // Pagination information.
  PageResponse pagination = 2;
}

// GetProductRequest is the request for getting a single product.
message GetProductRequest {
  // UUID of the product to retrieve.
  string uuid = 1 [(buf.validate.field).string.uuid = true, (buf.validate.field).required = true];
}

// ListProductReleasesRequest is the request for listing releases of a product.
message ListProductReleasesRequest {
  // UUID of the product.
  string product_uuid = 1 [(buf.validate.field).string.uuid = true, (buf.validate.field).required = true, json_name = "productUuid"];

  // Pagination parameters.
  PageRequest pagination = 2;

  // Include pre-releases in the response.
  bool include_pre_releases = 3 [json_name = "includePreReleases"];

  // Filter by release date range.
  DateRange release_date_range = 4 [json_name = "releaseDateRange"];

  // Optional sort specification.
  SortSpec sort = 5;
}

// ListProductReleasesResponse is the response for listing product releases.
message ListProductReleasesResponse {
  // List of product releases.
  repeated ProductRelease releases = 1;

  // Pagination information.
  PageResponse pagination = 2;
}

// GetProductReleaseRequest is the request for getting a single product release.
message GetProductReleaseRequest {
  // UUID of the product release to retrieve.
  string uuid = 1 [(buf.validate.field).string.uuid = true, (buf.validate.field).required = true];
}