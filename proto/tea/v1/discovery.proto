syntax = "proto3";

package tea.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "tea/v1/common.proto";

option go_package = "github.com/CycloneDX/transparency-exchange-api/gen/go/tea/v1;teav1";
option java_package = "org.cyclonedx.tea.v1";
option java_multiple_files = true;
option csharp_namespace = "CycloneDX.Tea.V1";

// ============================================================================
// Discovery Service
// ============================================================================

// DiscoveryService provides TEI (Transparency Exchange Identifier) resolution
// and API endpoint discovery capabilities.
//
// The discovery flow:
// 1. Client has a TEI (e.g., from QR code, invoice, software about box)
// 2. Client extracts domain from TEI and fetches /.well-known/tea
// 3. Client connects to listed endpoint and calls Discover with the TEI
// 4. Server resolves TEI to a ProductRelease UUID
// 5. Client can then use Consumer API to fetch artifacts
service DiscoveryService {
  // Discover resolves a TEI to a ProductRelease.
  // This is the primary entry point for TEA clients.
  //
  // The TEI is URL-encoded in the query parameter.
  // Example: /v1/discovery?tei=urn%3Atei%3Auuid%3Aexample.com%3A...
  rpc Discover(DiscoverRequest) returns (DiscoverResponse) {
    option (google.api.http) = {
      get: "/v1/discovery"
    };
  }

  // GetWellKnown returns the .well-known/tea discovery document.
  // This is typically served as a static JSON file, but can be dynamic.
  //
  // Note: In production, this is served at /.well-known/tea not /v1.
  // The gRPC method is provided for completeness and testing.
  rpc GetWellKnown(GetWellKnownRequest) returns (WellKnownResponse) {
    option (google.api.http) = {
      get: "/.well-known/tea"
    };
  }

  // Health check for the discovery service.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/v1/health"
    };
  }

  // GetServerInfo returns metadata about the TEA server.
  rpc GetServerInfo(GetServerInfoRequest) returns (ServerInfo) {
    option (google.api.http) = {
      get: "/v1/info"
    };
  }
}

// ============================================================================
// TEI Types
// ============================================================================

// TeiType specifies the type component of a TEI URN.
enum TeiType {
  // Unspecified TEI type.
  TEI_TYPE_UNSPECIFIED = 0;

  // UUID-based TEI: urn:tei:uuid:<domain>:<uuid>
  TEI_TYPE_UUID = 1;

  // PURL-based TEI: urn:tei:purl:<domain>:<purl>
  TEI_TYPE_PURL = 2;

  // SWID-based TEI: urn:tei:swid:<domain>:<swid>
  TEI_TYPE_SWID = 3;

  // Hash-based TEI: urn:tei:hash:<domain>:<hashtype>:<hash>
  TEI_TYPE_HASH = 4;

  // EAN/UPC-based TEI: urn:tei:eanupc:<domain>:<barcode>
  TEI_TYPE_EANUPC = 5;

  // GTIN-based TEI: urn:tei:gtin:<domain>:<gtin>
  TEI_TYPE_GTIN = 6;

  // ASIN-based TEI: urn:tei:asin:<domain>:<asin>
  TEI_TYPE_ASIN = 7;

  // UDI-based TEI: urn:tei:udi:<domain>:<udi>
  TEI_TYPE_UDI = 8;
}

// ParsedTei represents a parsed TEI URN structure.
message ParsedTei {
  // Original TEI string.
  string raw = 1;

  // TEI type component.
  TeiType type = 2;

  // Domain name component (used for DNS resolution).
  string domain = 3;

  // Unique identifier component.
  string unique_id = 4 [json_name = "uniqueId"];
}

// ============================================================================
// Well-Known Discovery
// ============================================================================

// GetWellKnownRequest is the request for the .well-known/tea endpoint.
message GetWellKnownRequest {
  // No parameters needed.
}

// WellKnownResponse is the response from /.well-known/tea.
// Conforms to the TEA Well-Known Schema.
message WellKnownResponse {
  // Schema version. Currently always 1.
  int32 schema_version = 1 [
    (buf.validate.field).int32.const = 1,
    json_name = "schemaVersion"
  ];

  // List of available TEA endpoints.
  repeated Endpoint endpoints = 2 [(buf.validate.field).repeated.min_items = 1];
}

// Endpoint describes a TEA API endpoint.
message Endpoint {
  // Base URL of the TEA API endpoint (no trailing slash).
  // Example: "https://api.teaexample.com"
  string url = 1 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).required = true
  ];

  // Supported TEA API versions for this endpoint.
  // Example: ["0.2.0-beta.2", "1.0.0"]
  repeated string versions = 2 [(buf.validate.field).repeated.min_items = 1];

  // Optional priority (0.0 to 1.0). Higher = preferred.
  // Default is 1.0.
  float priority = 3;
}

// ============================================================================
// Discovery Request/Response
// ============================================================================

// DiscoverRequest is the request to resolve a TEI.
message DiscoverRequest {
  // The TEI to resolve (URL-encoded).
  // Example: urn:tei:uuid:cyclonedx.org:d4d9f54a-abcf-11ee-ac79-1a52914d44b1
  string tei = 1 [
    (buf.validate.field).string.min_len = 10,
    (buf.validate.field).string.max_len = 2048,
    (buf.validate.field).required = true
  ];
}

// DiscoverResponse contains the result of TEI resolution.
message DiscoverResponse {
  // UUID of the resolved ProductRelease.
  string product_release_uuid = 1 [
    (buf.validate.field).string.uuid = true,
    json_name = "productReleaseUuid"
  ];

  // Base URL of this TEA server.
  string server_url = 2 [json_name = "serverUrl"];

  // Supported API versions on this server.
  repeated string supported_versions = 3 [json_name = "supportedVersions"];

  // The TEI that was resolved.
  string tei = 4;

  // Parsed TEI components (for client convenience).
  ParsedTei parsed_tei = 5 [json_name = "parsedTei"];

  // All known TEIs for this ProductRelease.
  // Helps clients avoid duplicate entries.
  repeated string all_teis = 6 [json_name = "allTeis"];

  // All known identifiers for this ProductRelease.
  repeated Identifier identifiers = 7;

  // Basic ProductRelease metadata.
  ProductReleaseMetadata product_release = 8 [json_name = "productRelease"];

  // Whether authentication is required to access this release's artifacts.
  bool authentication_required = 9 [json_name = "authenticationRequired"];

  // Supported authentication methods (if authentication is required).
  repeated AuthMethod auth_methods = 10 [json_name = "authMethods"];
}

// ProductReleaseMetadata contains basic info about a ProductRelease
// returned during discovery (before full API access).
message ProductReleaseMetadata {
  // UUID of the ProductRelease.
  string uuid = 1;

  // Version string.
  string version = 2;

  // Product name (if available).
  string product_name = 3 [json_name = "productName"];

  // Vendor name (if available).
  string vendor_name = 4 [json_name = "vendorName"];

  // Release date.
  google.protobuf.Timestamp release_date = 5 [json_name = "releaseDate"];

  // Number of artifacts available.
  int32 artifact_count = 6 [json_name = "artifactCount"];
}

// ============================================================================
// Authentication Methods
// ============================================================================

// AuthMethod describes a supported authentication method.
enum AuthMethod {
  // Unspecified authentication method.
  AUTH_METHOD_UNSPECIFIED = 0;

  // HTTP Bearer token authentication.
  AUTH_METHOD_BEARER_TOKEN = 1;

  // Mutual TLS with client certificates.
  AUTH_METHOD_MTLS = 2;

  // API key authentication.
  AUTH_METHOD_API_KEY = 3;

  // OAuth 2.0 authentication.
  AUTH_METHOD_OAUTH2 = 4;

  // OpenID Connect authentication.
  AUTH_METHOD_OIDC = 5;
}

// ============================================================================
// Server Information
// ============================================================================

// GetServerInfoRequest is the request for server information.
message GetServerInfoRequest {
  // No parameters needed.
}

// ServerInfo contains metadata about the TEA server.
message ServerInfo {
  // Server name/identifier.
  string name = 1;

  // Server version.
  string version = 2;

  // TEA specification version(s) supported.
  repeated string spec_versions = 3 [json_name = "specVersions"];

  // Server description.
  string description = 4;

  // Operator contact information.
  string operator_contact = 5 [json_name = "operatorContact"];

  // Terms of service URL.
  string tos_url = 6 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "tosUrl"
  ];

  // Privacy policy URL.
  string privacy_url = 7 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "privacyUrl"
  ];

  // Documentation URL.
  string documentation_url = 8 [
    (buf.validate.field).string.uri = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE,
    json_name = "documentationUrl"
  ];

  // Supported features/capabilities.
  ServerCapabilities capabilities = 9;

  // Rate limiting information.
  RateLimitInfo rate_limits = 10 [json_name = "rateLimits"];
}

// ServerCapabilities describes what features the server supports.
message ServerCapabilities {
  // Consumer API is available.
  bool consumer_api = 1 [json_name = "consumerApi"];

  // Publisher API is available.
  bool publisher_api = 2 [json_name = "publisherApi"];

  // Insights/Query API is available.
  bool insights_api = 3 [json_name = "insightsApi"];

  // Collection signing is supported.
  bool collection_signing = 4 [json_name = "collectionSigning"];

  // Sigstore integration is available.
  bool sigstore_integration = 5 [json_name = "sigstoreIntegration"];

  // Search by checksum is supported.
  bool checksum_search = 6 [json_name = "checksumSearch"];

  // CEL query language is supported.
  bool cel_queries = 7 [json_name = "celQueries"];

  // Streaming downloads are supported.
  bool streaming_downloads = 8 [json_name = "streamingDownloads"];

  // Supported artifact types.
  repeated ArtifactTypeSupport artifact_types = 9 [json_name = "artifactTypes"];
}

// ArtifactTypeSupport describes support for an artifact type.
message ArtifactTypeSupport {
  // Artifact type.
  string type = 1;

  // Supported formats (MIME types).
  repeated string formats = 2;
}

// RateLimitInfo provides rate limiting details.
message RateLimitInfo {
  // Requests per minute for unauthenticated clients.
  int32 unauthenticated_rpm = 1 [json_name = "unauthenticatedRpm"];

  // Requests per minute for authenticated clients.
  int32 authenticated_rpm = 2 [json_name = "authenticatedRpm"];

  // Maximum download bandwidth (bytes per second) per client.
  int64 max_bandwidth_bps = 3 [json_name = "maxBandwidthBps"];
}
