    collection-belongs-to-type:
      type: string
      description: Indicates whether a collection belongs to a component release or a product release
      enum:
        - COMPONENT_RELEASE
        - PRODUCT_RELEASE

    #
    # TEA Artifact and related objects
    #
    artifact:
      type: object
      description: A security-related document
      properties:
        uuid:
          description: The UUID of the TEA Artifact object. Together with *version* uniquely identifies the TEA Artifact.
          "$ref": "#/components/schemas/uuid"
        version:
          description: |
            An integer with default value 1.
            Together with *uuid* uniquely identifies the TEA Artifact.
            This field can be used to designate successive, immutable revisions of an artefact content (e.g. an updated VEX file).
          type: integer
          default: 1
        name:
          type: string
          description: Name of TEA Artifact
        type:
          description: Type of TEA Artifact
          "$ref": "#/components/schemas/artifact-type"
        createdDate:
          description: The date when the TEA Artifact revision was created.
          "$ref": "#/components/schemas/date-time"
        distributionIds:
          type: array
          description: |
            List of TEA Component Release distributions that this TEA Artifact applies to.
            If absent or empty, the TEA Artifact applies to all distributions.
          items:
            "$ref": "#/components/schemas/uuid"
            description: |
              The distribution IDs of the TEA component release distributions that this TEA Artifact applies to.
        formats:
          type: array
          description: |
            List of objects with the same content, but in different formats.
            The order of the list has no significance.
          items:
            "$ref": "#/components/schemas/artifact-format"
      required:
        - uuid
        - type
        - formats
      examples:
        - uuid: 1cb47b95-8bf8-3bad-a5a4-0d54d86e10ce
          name: Build SBOM
          type: BOM
          formats:
            - mediaType: application/vnd.cyclonedx+xml
              description: CycloneDX SBOM (XML)
              url: https://repo.maven.apache.org/maven2/org/apache/logging/log4j/log4j-core/2.24.3/log4j-core-2.24.3-cyclonedx.xml
              signatureUrl: https://repo.maven.apache.org/maven2/org/apache/logging/log4j/log4j-core/2.24.3/log4j-core-2.24.3-cyclonedx.xml.asc
              checksums:
                - algType: MD5
                  algValue: 2e1a525afc81b0a8ecff114b8b743de9
                - algType: SHA-1
                  algValue: 5a7d4caef63c5c5ccdf07c39337323529eb5a770
        - uuid: dfa35519-9734-4259-bba1-3e825cf4be06
          version: 7
          name: Vulnerability Disclosure Report
          type: VULNERABILITIES
          formats:
            - mediaType: application/vnd.cyclonedx+xml
              description: CycloneDX VDR (XML)
              url: https://logging.apache.org/cyclonedx/vdr.xml
              checksums:
                - algType: SHA-256
                  algValue: 75b81020b3917cb682b1a7605ade431e062f7a4c01a412f0b87543b6e995ad2a
    artifact-type:
      type: string
      description: Specifies the type of external reference.
      enum:
        - ATTESTATION
        - BOM
        - BUILD_META
        - CERTIFICATION
        - FORMULATION
        - LICENSE
        - RELEASE_NOTES
        - SECURITY_TXT
        - THREAT_MODEL
        - VULNERABILITIES
        - OTHER
    artifact-format:
      type: object
      description: A security-related document in a specific format
      properties:
        mediaType:
          type: string
          description: The Media Type of the document
        description:
          type: string
          description: A free text describing the TEA Artifact
        url:
          type: string
          description: Direct download URL for the TEA Artifact
          format: url
        signatureUrl:
          type: string
          description: Direct download URL for an external signature of the TEA Artifact
          format: url
        checksums:
          type: array
          description: List of checksums for the TEA Artifact
          items:
            "$ref": "#/components/schemas/checksum"
    checksum:
      type: object
      properties:
        algType:
          description: Checksum algorithm
          "$ref": "#/components/schemas/checksum-type"
        algValue:
          type: string
          description: Checksum value
      required:
        - algType
        - algValue
    checksum-type:
      type: string
      description: Checksum algorithm
      enum:
        - MD5
        - SHA-1
        - SHA-256
        - SHA-384
        - SHA-512
        - SHA3-256
        - SHA3-384
        - SHA3-512
        - BLAKE2b-256
        - BLAKE2b-384
        - BLAKE2b-512
        - BLAKE3
    unknown-error-type:
      type: string
      description: Classification of TEA error response
      enum:
        - OBJECT_UNKNOWN
        - OBJECT_NOT_SHAREABLE
    #
    # Types used in API responses
    #
    error-response:
      type: object
      description: Error response
      additionalProperties: false
      properties:
        error:
          $ref: "#/components/schemas/unknown-error-type"
      required:
        - error

    tea-server-info:
      type: object
      description: TEA server information including URL, versions, and optional priority
      additionalProperties: false
      properties:
        rootUrl:
          description: Root URL of the TEA server for this TEI without trailing slash
          type: string
          format: uri
          example: https://api.teaexample.com
        versions:
          description: Supported TEA API versions at this server without v prefix
          type: array
          minItems: 1
          items:
            type: string
          example: ["0.2.0-beta.2", "1.0.0"]
        priority:
          description: Optional priority for this server (0.0 to 1.0, where 1.0 is highest priority)
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          example: 0.8
      required:
        - rootUrl
        - versions

    discovery-info:
      type: object
      description: Discovery information for a TEI
      additionalProperties: false
      properties:
        productReleaseUuid:
          description: UUID of the resolved TEA Product Release
          $ref: "#/components/schemas/uuid"
          example: d4d9f54a-abcf-11ee-ac79-1a52914d44b
        servers:
          description: Array of TEA server information
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/tea-server-info"
      required:
        - productReleaseUuid
        - servers

    #
    # CLE (Common Lifecycle Enumeration) objects
    # Based on ECMA-428 TC54 TG3 CLE Specification v1.0.0
    #
    cle-event-type:
      type: string
      description: The type of CLE lifecycle event
      enum:
        - released
        - endOfDevelopment
        - endOfSupport
        - endOfLife
        - endOfDistribution
        - endOfMarketing
        - supersededBy
        - componentRenamed
        - withdrawn
    cle-version-specifier:
      type: object
      description: A version specifier that can be either a single version or a version range
      properties:
        version:
          type: string
          description: A specific version string
        range:
          type: string
          description: A version range in vers format (e.g. "vers:npm/>=1.0.0|<2.0.0")
    cle-event:
      type: object
      description: A discrete lifecycle event from the CLE specification
      properties:
        id:
          type: integer
          description: A unique, auto-incrementing integer identifier for the event
        type:
          description: The type of lifecycle event
          $ref: "#/components/schemas/cle-event-type"
        effective:
          type: string
          format: date-time
          description: ISO 8601 timestamp (UTC) when the event takes effect
        published:
          type: string
          format: date-time
          description: ISO 8601 timestamp (UTC) when the event was first published
        version:
          type: string
          description: Version string (used by released event type)
        versions:
          type: array
          description: List of version specifiers affected by this event
          items:
            $ref: "#/components/schemas/cle-version-specifier"
        supportId:
          type: string
          description: Reference to a support policy ID defined in the definitions section
        license:
          type: string
          description: License identifier (used by released event type)
        supersededByVersion:
          type: string
          description: Version string that supersedes the affected versions (used by supersededBy event type)
        identifiers:
          type: array
          description: New identifiers for the component (used by componentRenamed event type)
          items:
            $ref: "#/components/schemas/identifier"
        eventId:
          type: integer
          description: ID of the event being withdrawn (used by withdrawn event type)
        reason:
          type: string
          description: Human-readable explanation (used by withdrawn event type)
        description:
          type: string
          description: Human-readable description of the event
        references:
          type: array
          description: List of URLs to supporting documentation
          items:
            type: string
            format: uri
      required:
        - id
        - type
        - effective
        - published
      examples:
        - id: 1
          type: released
          effective: "2024-01-01T00:00:00Z"
          version: "1.0.0"
          license: MIT
          published: "2023-06-01T00:00:00Z"
        - id: 3
          type: endOfSupport
          effective: "2024-01-01T00:00:00Z"
          versions:
            - version: "1.0.0"
          supportId: standard
          published: "2023-06-01T00:00:00Z"
    cle-support-definition:
      type: object
      description: A support policy definition from CLE
      properties:
        id:
          type: string
          description: Unique identifier for the support policy
        description:
          type: string
          description: Human-readable description of the policy
        url:
          type: string
          format: uri
          description: URL to detailed documentation about this support policy
      required:
        - id
        - description
      examples:
        - id: standard
          description: Standard product support policy
          url: https://example.com/support/standard
    cle-definitions:
      type: object
      description: Container for reusable CLE policy definitions
      properties:
        support:
          type: array
          description: List of support policies
          items:
            $ref: "#/components/schemas/cle-support-definition"
    cle:
      type: object
      description: |
        Common Lifecycle Enumeration (CLE) object based on ECMA-428 TC54 TG3 CLE Specification v1.0.0.
        Contains lifecycle events and optional reusable definitions for a component or product.
      properties:
        events:
          type: array
          description: |
            Ordered array of CLE Event objects representing lifecycle events.
            MUST be ordered by ID in descending order (newest events with highest IDs first).
          items:
            $ref: "#/components/schemas/cle-event"
        definitions:
          description: Container for reusable policy definitions referenced by events
          $ref: "#/components/schemas/cle-definitions"
      required:
        - events
      examples:
        - events:
            - id: 3
              type: endOfSupport
              effective: "2025-06-01T00:00:00Z"
              versions:
                - range: "vers:npm/>=1.0.0|<2.0.0"
              supportId: standard
              published: "2025-01-01T00:00:00Z"
            - id: 2
              type: endOfDevelopment
              effective: "2025-01-01T00:00:00Z"
              versions:
                - version: "1.0.0"
              supportId: standard
              published: "2024-06-01T00:00:00Z"
            - id: 1
              type: released
              effective: "2024-01-01T00:00:00Z"
              version: "1.0.0"
              license: Apache-2.0
              published: "2024-01-01T00:00:00Z"
          definitions:
            support:
              - id: standard
                description: Standard product support policy
                url: https://example.com/support/standard

    pagination-details:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          example: '2024-03-20T15:30:00Z'
        pageStartIndex:
          type: integer
          format: int64
          default: 0
        pageSize:
          type: integer
          format: int64
          default: 100
        totalResults:
          type: integer
          format: int64
      required:
        - timestamp
        - pageStartIndex
        - pageSize
        - totalResults

    paginated-product-response:
      type: object
      description: A paginated response containing TEA Products
      allOf:
        - $ref: "#/components/schemas/pagination-details"
        - type: object
