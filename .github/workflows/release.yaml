# TEA Server Release Pipeline
#
# Builds and publishes container images on tag push.
# Integrates with SLSA provenance workflow for supply chain security.

name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read
    packages: write
    id-token: write # Required for Sigstore signing

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}/tea-server

jobs:
    # ─────────────────────────────────────────────────────────────────────────────
    # Build and push container image
    # ─────────────────────────────────────────────────────────────────────────────
    build:
        runs-on: ubuntu-latest
        outputs:
            digest: ${{ steps.build.outputs.digest }}
            version: ${{ steps.meta.outputs.version }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=sha,prefix=sha-

            - name: Build and push
              id: build
              uses: docker/build-push-action@v5
              with:
                  context: ./tea-server
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: true
                  sbom: true
                  outputs: type=registry,oci-mediatypes=true

    # ─────────────────────────────────────────────────────────────────────────────
    # Generate SLSA provenance
    # ─────────────────────────────────────────────────────────────────────────────
    provenance:
        needs: build
        permissions:
            contents: read
            packages: write
            id-token: write
            actions: read
        uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v1.10.0
        with:
            image: ghcr.io/${{ github.repository }}/tea-server
            digest: ${{ needs.build.outputs.digest }}
            registry-username: ${{ github.actor }}
        secrets:
            registry-password: ${{ secrets.GITHUB_TOKEN }}

    # ─────────────────────────────────────────────────────────────────────────────
    # Generate and sign SBOM
    # ─────────────────────────────────────────────────────────────────────────────
    sbom:
        needs: [build, provenance]
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Install cosign
              uses: sigstore/cosign-installer@v3

            - name: Install Syft
              uses: anchore/sbom-action/download-syft@v0

            - name: Generate SBOM
              run: |
                  syft \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }} \
                    -o spdx-json=sbom.spdx.json \
                    -o cyclonedx-json=sbom.cdx.json

            - name: Sign SBOM
              run: |
                  cosign sign-blob \
                    --yes \
                    --output-signature sbom.spdx.json.sig \
                    --output-certificate sbom.spdx.json.crt \
                    sbom.spdx.json

            - name: Attach SBOM to image
              run: |
                  cosign attach sbom \
                    --sbom sbom.spdx.json \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}

            - name: Upload SBOM artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: sbom
                  path: |
                      sbom.spdx.json
                      sbom.cdx.json
                      sbom.spdx.json.sig
                  retention-days: 90

    # ─────────────────────────────────────────────────────────────────────────────
    # Create GitHub Release
    # ─────────────────────────────────────────────────────────────────────────────
    release:
        needs: [build, sbom]
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download SBOM
              uses: actions/download-artifact@v4
              with:
                  name: sbom
                  path: sbom

            - name: Create Release
              uses: softprops/action-gh-release@v1
              with:
                  generate_release_notes: true
                  files: |
                      sbom/sbom.spdx.json
                      sbom/sbom.cdx.json
                      sbom/sbom.spdx.json.sig
