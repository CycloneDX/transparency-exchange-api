# TEA Server CI Pipeline
#
# Runs on all PRs and pushes to main. Validates:
# - Build (cargo check)
# - Tests (cargo test)
# - Linting (cargo clippy)
# - Security audit (cargo audit)

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'tea-server/**'
      - 'proto/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'tea-server/**'
      - 'proto/**'
      - '.github/workflows/ci.yaml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build and Test
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tea-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tea-server -> target
          key: ${{ runner.os }}-rust-${{ hashFiles('tea-server/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Build
        run: cargo check --locked

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test --locked
        env:
          # Disable integration tests that need Docker
          RUST_TEST_SKIP_INTEGRATION: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Security Audit
  # ─────────────────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tea-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration Tests (with testcontainers)
  # ─────────────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: tea-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tea-server -> target

      - name: Run integration tests
        run: cargo test --test integration
        # testcontainers will spin up Postgres automatically

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E Conformance Tests
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Conformance Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: tea-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tea-server -> target

      - name: Run E2E conformance tests
        run: cargo test --test e2e_conformance
